name: Build iOS (unsigned)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate missing platform projects
        run: |
          if [ ! -d "ios" ] || [ ! -d "android" ]; then
            flutter create --platforms=ios,android --org com.example --project-name first_flutter_app .
          fi

      - name: Fix CFBundleName (no underscores allowed for App ID name)
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleName FirstFlutterApp" ios/Runner/Info.plist

      - name: Install dependencies
        run: flutter pub get

      - name: Build unsigned archive
        run: flutter build ipa --release --no-codesign

      - name: Package unsigned IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: build/ios/ipa/unsigned.ipa
